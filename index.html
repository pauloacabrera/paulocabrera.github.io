<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paulo Cabrera | Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Garamond, 'EB Garamond', serif;
      background: #0f172a;
      color: white;
      line-height: 1.6;
    }

    header {
      background: #111827;
      padding: 60px 40px;
    }

    .header-inner {
      max-width: 1100px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      flex-wrap: wrap;
    }

    .header-text {
      flex: 1;
      min-width: 220px;
    }

    .header-text h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .header-text p {
      color: #94a3b8;
      font-size: 18px;
    }

    .header-photo {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .header-photo img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #38bdf8;
      background: #1e293b;
    }

    .photo-placeholder {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid #38bdf8;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 13px;
      text-align: center;
      padding: 10px;
    }

    section {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    h2 {
      font-size: 32px;
      margin-bottom: 25px;
      color: #38bdf8;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 14px;
      margin-bottom: 30px;
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 26px;
    }

    .card p {
      margin-bottom: 12px;
      color: #cbd5e1;
    }

    .repo-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #38bdf8;
      text-decoration: none;
      font-weight: bold;
    }

    .repo-link:hover {
      text-decoration: underline;
    }

    .preview-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }

    .preview-images-4 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-bottom: 20px;
    }

    .preview-images img,
    .preview-images-4 img {
      width: 100%;
      border-radius: 10px;
      border: 2px solid #334155;
    }

    ul {
      padding-left: 20px;
      color: #cbd5e1;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .skill {
      background: #334155;
      padding: 10px 16px;
      border-radius: 10px;
      font-size: 14px;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #94a3b8;
      border-top: 1px solid #1e293b;
      margin-top: 40px;
    }

    a {
      color: #38bdf8;
    }

    @media (max-width: 600px) {
      .header-inner {
        flex-direction: column-reverse;
        align-items: flex-start;
      }

      .header-text h1 {
        font-size: 34px;
      }

      .preview-images-4 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">

    <div class="header-text">
      <h1>Paulo A. Cabrera</h1>
      <p>BS Information Technology with Specialization in Cybersecurity</p>
    </div>

    <div class="header-photo">
      <!-- Rename your photo file to me.jpg and put it in the same folder -->
      <img src="me.jpg" alt="Paulo A. Cabrera"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
      <div class="photo-placeholder" style="display:none;">Your<br>photo here</div>
    </div>

  </div>
</header>

<section>

  <h2>Featured Projects</h2>

  <div class="card">

    <p>A simulation-based queue system designed to improve customer flow in a banking environment.</p>
