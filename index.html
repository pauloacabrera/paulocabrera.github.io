<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Paulo Cabrera | Portfolio</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Garamond, serif;
      background: #0f172a;
      color: white;
      line-height: 1.6;
    }

    header {
      background: #111827;
      padding: 60px 40px;
    }

    .header-inner {
      max-width: 1100px;
      margin: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 40px;
      flex-wrap: wrap;
    }

    .header-text h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    .header-text p {
      color: #94a3b8;
      font-size: 18px;
    }

    .header-photo img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #38bdf8;
      background: #1e293b;
      display: block;
    }

    .photo-placeholder {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid #38bdf8;
      background: #1e293b;
      display: none;
      align-items: center;
      justify-content: center;
      color: #64748b;
      font-size: 13px;
      text-align: center;
      padding: 10px;
    }

    section {
      max-width: 1100px;
      margin: auto;
      padding: 40px 20px;
    }

    h2 {
      font-size: 32px;
      margin-bottom: 25px;
      color: #38bdf8;
    }

    .card {
      background: #1e293b;
      padding: 25px;
      border-radius: 14px;
      margin-bottom: 30px;
    }

    .card h3 {
      margin-bottom: 10px;
      font-size: 26px;
    }

    .card p {
      color: #cbd5e1;
      margin-bottom: 12px;
    }

    .repo-link {
      color: #38bdf8;
      font-weight: bold;
      text-decoration: none;
    }

    .repo-link:hover {
      text-decoration: underline;
    }

    .preview-images img {
      width: 100%;
      border-radius: 10px;
      border: 2px solid #334155;
    }
  </style>
</head>

<body>

<header>
  <div class="header-inner">

    <div class="header-text">
      <h1>Paulo A. Cabrera</h1>
      <p>BS Information Technology with Specialization in Cybersecurity</p>
    </div>

    <div class="header-photo">
      <img src="1000094059" alt="Profile Photo"
        onerror="this.style.display='none'; document.getElementById('fallback').style.display='flex';">
      
      <div id="fallback" class="photo-placeholder">
        Image not found<br>Check file name
      </div>
    </div>

  </div>
</header>

<section>
  <h2>Featured Projects</h2>

  <div class="card">
    <h3>Bank Queue Management System</h3>
    <p>A simulation-based queue system designed to improve customer flow in a banking environment.</p>

    <a class="repo-link" href="https://github.com/your-repo" target="_blank">
      View Repository
    </a>

  </div>
</section>

</body>
</html>
